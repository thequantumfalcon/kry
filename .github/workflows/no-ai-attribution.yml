name: Attribution Guard

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read   # least-privilege: this guard only reads the tree

jobs:
  attribution-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Check tracked text artifacts
        run: python3 scripts/check_attribution.py
