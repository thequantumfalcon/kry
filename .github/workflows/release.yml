name: Release

# Cut a release by pushing a signed tag: git tag -s v0.1.0 -m "Release v0.1.0" && git push origin v0.1.0
# Produces a GitHub Release with the wheel + a source tarball, SHA-256 checksums, the release-verify
# proof, and a SLSA build-provenance attestation — all gated behind the release verifier.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub Release
      id-token: write        # build provenance via Sigstore OIDC
      attestations: write    # store the attestation
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Validate tag format
        run: |
          set -euo pipefail
          echo "tag: ${GITHUB_REF_NAME}"
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || { echo "Tag must be vMAJOR.MINOR.PATCH"; exit 1; }

      - name: Release gate (must pass before anything is published)
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build
          python -m pip install -e ".[dev]"
          python3 scripts/kry_release_verify.py --full --json-out release-verify.json

      - name: Build artifacts (wheel + source tarball + checksums)
        run: |
          set -euo pipefail
          mkdir -p dist
          python -m build --wheel --outdir dist
          git archive --format=tar.gz --prefix="kry-${GITHUB_REF_NAME}/" \
            -o "dist/kry-${GITHUB_REF_NAME}-source.tar.gz" HEAD
          ( cd dist && sha256sum ./* > checksums.txt )
          cat dist/checksums.txt

      - name: Build provenance attestation (SLSA Build Level 2)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.whl dist/*.tar.gz dist/checksums.txt release-verify.json \
            --title "${GITHUB_REF_NAME}" --generate-notes
