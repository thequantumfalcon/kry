name: CodeQL

# Static analysis (SAST) for the Python sources. Runs on PRs, pushes to main, and weekly.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "23 9 * * 1"  # weekly, Monday

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    # CodeQL is free on public repos; on private it needs GitHub Advanced Security.
    # Skip cleanly until this repo is public so CI never fails on it.
    if: ${{ !github.event.repository.private }}
    permissions:
      contents: read
      security-events: write  # upload CodeQL findings to the Security tab
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: python
          queries: security-extended
      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: "/language:python"
