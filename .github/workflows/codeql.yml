name: CodeQL

# Static analysis (SAST) for the Python sources. Runs on PRs, pushes to main, and weekly.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "23 9 * * 1"  # weekly, Monday

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    # CodeQL is free on public repos; on private it needs GitHub Advanced Security.
    # Skip cleanly until this repo is public so CI never fails on it.
    if: ${{ !github.event.repository.private }}
    permissions:
      contents: read
      security-events: write  # upload CodeQL findings to the Security tab
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: python
          queries: security-extended
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:python"
