name: Release

# Cut a release by pushing a signed tag: git tag -s v0.1.0 -m "Release v0.1.0" && git push origin v0.1.0
# Produces a GitHub Release with the wheel + a source tarball, SHA-256 checksums, the release-verify
# proof, and a SLSA build-provenance attestation — all gated behind the release verifier.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

# F6: one release per ref at a time — a re-pushed / racing tag can't mint two provenance attestations.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # F1: bind this id-token-bearing job to a protected environment. Add required reviewers in
    # Settings -> Environments -> "release" to gate signed-artifact publication behind approval
    # (no-op until configured, so this is safe to land now).
    environment: release
    permissions:
      contents: write       # create the GitHub Release
      id-token: write        # build provenance via Sigstore OIDC
      attestations: write    # store the attestation
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false   # F5: don't leave the write-scoped token in .git/config during build
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Validate tag format
        run: |
          set -euo pipefail
          echo "tag: ${GITHUB_REF_NAME}"
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || { echo "Tag must be vMAJOR.MINOR.PATCH"; exit 1; }

      - name: Verify the tag signature (audit F2 — fail closed on an unsigned/unknown-key tag)
        run: |
          set -euo pipefail
          git config gpg.ssh.allowedSignersFile "${GITHUB_WORKSPACE}/.github/allowed_signers"
          git verify-tag "${GITHUB_REF_NAME}"

      - name: Release gate (must pass before anything is published)
        run: |
          set -euo pipefail
          # L5: hash-pinned build frontend (this job holds id-token:write) — fail closed on a
          # tampered/substituted artifact instead of pulling floating latest via --upgrade.
          python -m pip install --require-hashes -r .github/build-requirements.txt
          python -m pip install -e ".[dev]"
          python3 scripts/kry_release_verify.py --full --json-out release-verify.json

      - name: Build artifacts (wheel + source tarball + checksums)
        run: |
          set -euo pipefail
          mkdir -p dist
          python -m build --wheel --outdir dist
          git archive --format=tar.gz --prefix="kry-${GITHUB_REF_NAME}/" \
            -o "dist/kry-${GITHUB_REF_NAME}-source.tar.gz" HEAD
          ( cd dist && sha256sum ./* > checksums.txt )
          cat dist/checksums.txt

      - name: Build provenance attestation (SLSA Build Level 2)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.whl dist/*.tar.gz dist/checksums.txt release-verify.json \
            --title "${GITHUB_REF_NAME}" --generate-notes
