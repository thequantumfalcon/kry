name: "Bug report"
description: Something in KRY isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: "Thanks for the report. **For a security vulnerability, do not use this form** — see [SECURITY.md](../../blob/main/SECURITY.md)."
  - type: input
    id: version
    attributes:
      label: KRY version / commit
      placeholder: "0.1.0 or a commit SHA"
    validations:
      required: true
  - type: dropdown
    id: python
    attributes:
      label: Python version
      options: ["3.11", "3.12", "3.13", "other"]
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15 / Ubuntu 24.04 / Windows 11 / ..."
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you did, what you expected, and what actually happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output / traceback
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for a duplicate
          required: true
        - label: This is NOT a security vulnerability (those go to SECURITY.md, never a public issue)
          required: true
        - label: I can reproduce this with the stdlib-only package (no third-party deps added to src/ or scripts/)
