name: Attribution Guard

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read   # least-privilege: this guard only reads the tree

jobs:
  attribution-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - name: Check tracked text artifacts
        run: python3 scripts/check_attribution.py
