name: Pages

# Publishes the static stranger-verification surface: the browser verifier /
# tamper playground (verifiers/web), the JS verifier it imports (verifiers/js),
# the live conformance corpus the demos fetch (vectors/), and SPEC.md.
# Nothing else — the site is the verify surface, not a mirror of the repo.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Stage the static verify surface
        run: |
          mkdir _site
          cp -r verifiers vectors _site/
          cp SPEC.md _site/
          printf '<!DOCTYPE html><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=verifiers/web/"><a href="verifiers/web/">kry browser verifier</a>\n' > _site/index.html
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        id: deployment
